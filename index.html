<body>
  <div class="container-fluid">

      <h1>Rock Paper Scissor</h1>
    </div>
    <div class="row justify-content-around">
      <div class="mb-3">
  <label for="formGroupExampleInput" class="form-label">Player Name:</label>
  <input type="text" class="form-control" id="formGroupExampleInput" placeholder="Example input placeholder">
</div>
<button class="button">
  <span class="shadow"></span>

  <div class="front">

  </div>
</button>

    <div class="card" style="width: 18rem;">
      <img src="img/rock.jpg" class="card-img-top" alt="...">
      <div class="card-body">
        <h5 class="card-title">Rock</h5>
        <p class="card-text">will you pick rock?</p>
        <a href="#" class="btn btn-primary">Play Rock</a>
      </div>
    </div>
    <div class="card" style="width: 18rem;">
      <img src="img/paper.jpg" class="card-img-top" alt="...">

        <h5 class="card-title">Paper</h5>
        <p class="card-text">will you pick paper?</p>
        <a href="#" class="btn btn-primary">Play Paper</a>
      </div>
    </div>
    <div class="card" style="width: 18rem;">
      <img src="img/scissors.jpg" class="card-img-top" alt="...">
      <div class="card-body">
        <h5 class="card-title">Scissors</h5>
